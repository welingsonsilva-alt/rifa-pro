<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFA DA KELLY - Oficial</title>
    <style>
        :root { --disp: #10b981; --res: #facc15; --pago: #ef4444; --sel: #3b82f6; --bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }

        /* Header e Botão Meus Números */
        .nav { width: 100%; max-width: 1200px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; color: #0f172a; }
        .btn-meus-numeros { background: var(--sel); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-meus-numeros:hover { background: #2563eb; }

        .header-rifa { text-align: center; margin-bottom: 30px; }
        .titulo-rifa { font-size: 2rem; font-weight: 800; margin: 10px 0; }

        /* Legenda */
        .legenda { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; font-size: 13px; font-weight: 600; color: #64748b; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }

        /* Grid Centralizado com 10 Colunas */
        .container-grid { width: 100%; max-width: 700px; display: flex; justify-content: center; padding: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 8px; 
            width: 100%;
        }

        .num { 
            aspect-ratio: 1 / 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 14px;
            background: #fff; 
            border: 2px solid #e2e8f0; 
            cursor: pointer; 
            transition: 0.2s;
        }

        .disponivel { border-color: var(--disp); color: var(--disp); }
        .reservado { background: var(--res); color: #854d0e; border: none; cursor: not-allowed; }
        .pago { background: var(--pago); color: #fff; border: none; cursor: not-allowed; }
        .selecionado { background: var(--sel) !important; color: #fff !important; border: none; }

        /* Sidebar e Checkout */
        .sidebar { position: fixed; bottom: 20px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; width: 90%; max-width: 400px; z-index: 1000; border: 1px solid #e2e8f0; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-confirmar { width: 100%; padding: 15px; background: var(--disp); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

    <div class="nav">
        <div class="logo">RIFA Da KELLY</div>
        <button class="btn-meus-numeros" onclick="abrirConsulta()">Meus Números</button>
    </div>

    <div class="header-rifa">
        <h1 class="titulo-rifa" id="rifa-titulo">Carregando...</h1>
        <div class="legenda">
            <div class="leg-item"><div class="dot" style="border: 2px solid var(--disp)"></div> Disponível</div>
            <div class="leg-item"><div class="dot" style="background: var(--sel)"></div> Selecionado</div>
            <div class="leg-item"><div class="dot" style="background: var(--res)"></div> Reservado</div>
            <div class="leg-item"><div class="dot" style="background: var(--pago)"></div> Pago</div>
        </div>
        <div style="display:flex; justify-content:center; gap:10px">
            <button onclick="verInfo('premios')" style="cursor:pointer; border:none; background:#f1f5f9; padding:8px 15px; border-radius:5px">🎁 Prêmios</button>
            <button onclick="verInfo('regras')" style="cursor:pointer; border:none; background:#f1f5f9; padding:8px 15px; border-radius:5px">📜 Regras</button>
        </div>
    </div>

    <div class="container-grid">
        <div id="grid" class="grid"></div>
    </div>

    <div id="sidebar" class="sidebar">
        <h3 id="resumo" style="margin-top:0; color:var(--sel)">0 números selecionados</h3>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="cpf" placeholder="CPF">
        <input type="email" id="email" placeholder="E-mail">
        <button class="btn-confirmar" onclick="finalizar()">RESERVAR AGORA</button>
    </div>

    <script>
        let selecionados = [];
        async function carregar() {
            const [resC, resN] = await Promise.all([fetch('/api/config'), fetch('/api/numeros')]);
            const config = await resC.json();
            document.getElementById('rifa-titulo').innerText = config.titulo_rifa?.valor || 'Rifa Premiada';
            
            const dados = await resN.json();
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            dados.forEach(n => {
                const div = document.createElement('div');
                // IMPORTANTE: Aqui garantimos que o status venha do banco
                div.className = `num ${n.status}`;
                div.innerText = n.numero;
                if(n.status === 'disponivel') {
                    div.onclick = () => {
                        if(selecionados.includes(n.numero)) selecionados = selecionados.filter(x => x !== n.numero);
                        else selecionados.push(n.numero);
                        div.classList.toggle('selecionado');
                        document.getElementById('sidebar').style.display = selecionados.length ? 'block' : 'none';
                        document.getElementById('resumo').innerText = `${selecionados.length} selecionados (R$ ${selecionados.length * 10})`;
                    };
                }
                grid.appendChild(div);
            });
        }

        async function finalizar() {
            const payload = {
                numeros: selecionados,
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                metodo: 'PIX'
            };
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.pix_code) alert("Reserva feita! Pague o PIX para confirmar.");
            location.reload();
        }

        function abrirConsulta() {
            const cpf = prompt("Digite seu CPF para consultar:");
            if(cpf) window.location.href = `/api/consulta/${cpf}`;
        }

        carregar();
    </script>
</body>
</html>
