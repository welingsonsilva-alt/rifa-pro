<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFA PRO</title>
    <style>
        :root { --disp: #10b981; --res: #facc15; --pago: #ef4444; --sel: #3b82f6; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; max-width: 800px; margin: 20px auto; }
        .num { height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; background: #fff; cursor: pointer; border: 2px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .disponivel { border-color: var(--disp); color: var(--disp); }
        .selecionado { background: var(--sel) !important; color: white !important; }
        .reservado { background: var(--res); color: white; cursor: not-allowed; }
        .pago { background: var(--pago); color: white; cursor: not-allowed; }
        .sidebar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: none; text-align: center; }
        input { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 80%; max-width: 300px; }
        button { padding: 10px 20px; background: var(--disp); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">RIFA PRO</h1>
    <div id="grid" class="grid"></div>

    <div id="sidebar" class="sidebar">
        <div id="resumo" style="margin-bottom: 10px;"></div>
        <input type="text" id="nome" placeholder="Nome Completo"><br>
        <input type="text" id="cpf" placeholder="CPF"><br>
        <input type="email" id="email" placeholder="E-mail"><br>
        <input type="text" id="tel" placeholder="WhatsApp"><br>
        <button onclick="comprar()">GERAR PIX</button>
    </div>

    <script>
        let selecionados = [];
        async function carregar() {
            const res = await fetch('/api/numeros');
            const dados = await res.json();
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            dados.forEach(n => {
                const div = document.createElement('div');
                div.className = `num ${n.status}`;
                div.innerText = n.numero;
                if(n.status === 'disponivel') {
                    div.onclick = () => {
                        if(selecionados.includes(n.numero)) selecionados = selecionados.filter(x => x !== n.numero);
                        else selecionados.push(n.numero);
                        div.classList.toggle('selecionado');
                        document.getElementById('sidebar').style.display = selecionados.length ? 'block' : 'none';
                        document.getElementById('resumo').innerText = selecionados.length + " números selecionados";
                    };
                }
                grid.appendChild(div);
            });
        }
        async function comprar() {
            const payload = {
                numeros: selecionados,
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('tel').value,
                metodo: 'PIX'
            };
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.pix_code) {
                alert("PIX Gerado! Use a função Meus Números para ver o código.");
                location.reload();
            }
        }
        carregar();
    </script>
</body>
</html>
