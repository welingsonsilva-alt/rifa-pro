<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFA DA KELLY</title>
    <style>
        :root { --disp: #10b981; --res: #facc15; --pago: #ef4444; --sel: #3b82f6; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; max-width: 600px; padding: 20px; }
        .num { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: #fff; border: 2px solid #e2e8f0; cursor: pointer; font-weight: bold; }
        .disponivel { border-color: var(--disp); color: var(--disp); }
        .selecionado { background: var(--sel) !important; color: #fff !important; }
        .reservado { background: var(--res); color: #854d0e; cursor: not-allowed; border: none; }
        
        .sidebar { position: fixed; right: 0; top: 0; width: 350px; height: 100vh; background: white; padding: 25px; box-shadow: -5px 0 15px rgba(0,0,0,0.05); display: none; flex-direction: column; z-index: 1000; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-pay { background: var(--disp); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }
        #card-fields { display: none; background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        @media (max-width: 1000px) { .sidebar { position: fixed; bottom: 0; top: auto; width: 100%; height: auto; border-radius: 20px 20px 0 0; } }
    </style>
</head>
<body>
    <h1 style="margin-top:40px">RIFA DA KELLY</h1>
    <div id="grid" class="grid"></div>

    <aside id="sidebar" class="sidebar">
        <h3>Finalizar Reserva</h3>
        <p id="resumo" style="font-weight:bold; color:var(--sel)"></p>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="cpf" placeholder="CPF">
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="tel" placeholder="WhatsApp">
        
        <label>Forma de Pagamento:</label>
        <select id="metodo" onchange="toggleCard()">
            <option value="PIX">PIX</option>
            <option value="CREDIT_CARD">Cartão de Crédito</option>
        </select>

        <div id="card-fields">
            <input type="text" id="card_num" placeholder="Número do Cartão">
            <input type="text" id="card_name" placeholder="Nome no Cartão">
            <div style="display:flex; gap:5px">
                <input type="text" id="card_month" placeholder="MM">
                <input type="text" id="card_year" placeholder="AAAA">
                <input type="text" id="card_cvv" placeholder="CVV">
            </div>
        </div>

        <button class="btn-pay" id="btn-submit" onclick="enviarPagamento()">CONFIRMAR E PAGAR</button>
    </aside>

    <div id="modal-pix" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:2000">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center; max-width:90%">
            <h3>Pagamento PIX</h3>
            <img id="qr-img" style="width:200px">
            <p id="pix-code" style="font-size:10px; word-break:break-all; background:#eee; padding:10px"></p>
            <button class="btn-pay" onclick="location.reload()">JÁ PAGUEI / FECHAR</button>
        </div>
    </div>

    <script>
        let selecionados = [];
        async function carregar() {
            const res = await fetch('/api/numeros');
            const dados = await res.json();
            const grid = document.getElementById('grid');
            dados.forEach(n => {
                const div = document.createElement('div');
                div.className = `num ${n.status}`;
                div.innerText = n.numero;
                if(n.status === 'disponivel') div.onclick = () => {
                    if(selecionados.includes(n.numero)) selecionados = selecionados.filter(x => x !== n.numero);
                    else selecionados.push(n.numero);
                    div.classList.toggle('selecionado');
                    document.getElementById('sidebar').style.display = selecionados.length ? 'flex' : 'none';
                    document.getElementById('resumo').innerText = `${selecionados.length} números (R$ ${selecionados.length * 10})`;
                };
                grid.appendChild(div);
            });
        }
        function toggleCard() {
            document.getElementById('card-fields').style.display = document.getElementById('metodo').value === 'CREDIT_CARD' ? 'block' : 'none';
        }
        async function enviarPagamento() {
            const btn = document.getElementById('btn-submit');
            btn.innerText = "PROCESSANDO..."; btn.disabled = true;
            const payload = {
                numeros: selecionados, nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value, email: document.getElementById('email').value,
                telefone: document.getElementById('tel').value, metodo: document.getElementById('metodo').value,
                cardData: {
                    number: document.getElementById('card_num').value, holderName: document.getElementById('card_name').value,
                    expiryMonth: document.getElementById('card_month').value, expiryYear: document.getElementById('card_year').value,
                    ccv: document.getElementById('card_cvv').value
                }
            };
            try {
                const res = await fetch('/api/checkout', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                if(data.metodo === 'PIX') {
                    document.getElementById('qr-img').src = 'data:image/png;base64,' + data.pix.image;
                    document.getElementById('pix-code').innerText = data.pix.code;
                    document.getElementById('modal-pix').style.display = 'flex';
                } else {
                    alert("Pagamento no Cartão Aprovado!");
                    location.reload();
                }
            } catch(e) { alert(e.message); btn.innerText = "CONFIRMAR E PAGAR"; btn.disabled = false; }
        }
        carregar();
    </script>
</body>
</html>
